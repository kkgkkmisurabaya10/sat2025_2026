<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Soal SAT Kelas 1-5 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background-color: #f4f7f6; }
        .hidden { display: none !important; }
        .card-custom { border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: none; }
        .header-bg { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); color: white; border-radius: 15px 15px 0 0; }
        .logo-img { width: 80px; height: auto; margin-bottom: 15px; border-radius: 10px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">Bank Soal SAT 2026</a>
        <div class="d-flex">
            <button id="btnNavAdmin" class="btn btn-outline-light btn-sm" onclick="showLoginView()">Login Internal</button>
            <button id="btnNavLogout" class="btn btn-danger btn-sm hidden" onclick="logoutAdmin()"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </div>
</nav>

<div id="dashboardView" class="container pb-5">
    <div class="text-center mb-4">
        <img src="https://drive.google.com/uc?export=view&id=ID_GAMBAR_DRIVE_ANDA" alt="Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/80?text=SAT'">
        <h3>Bank Soal SAT Kelas 1-5</h3>
        <p class="text-muted">KKMI Surabaya 10 - Tahun Pelajaran 2025/2026</p>
    </div>

    <div id="roleBanner" class="alert alert-info hidden text-center"></div>

    <div id="uploadSection" class="card card-custom mb-4">
        <div class="card-header header-bg py-3">
            <h5 class="mb-0"><i class="fas fa-upload"></i> Form Pengumpulan Berkas SAT</h5>
        </div>
        <div class="card-body">
            <form id="uploadForm">
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label>Email Pengirim <small class="text-danger">*</small></label>
                        <input type="email" id="email" class="form-control" placeholder="email@gmail.com" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label>Nama Lengkap <small class="text-danger">*</small></label>
                        <input type="text" id="nama" class="form-control" placeholder="Nama Guru" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label>Pilih Kelas <small class="text-danger">*</small></label>
                        <select id="kelas" class="form-select" required>
                            <option value="">-- Pilih Kelas --</option>
                            <option value="1">Kelas 1</option>
                            <option value="2">Kelas 2</option>
                            <option value="3">Kelas 3</option>
                            <option value="4">Kelas 4</option>
                            <option value="5">Kelas 5</option>
                        </select>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label>Mata Pelajaran <small class="text-danger">*</small></label>
                        <input type="text" id="mapel" class="form-control" placeholder="Cth: Akidah Akhlak" required>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label>Kisi-kisi (Excel)</label>
                        <input type="file" id="fileKisi" class="form-control" accept=".xlsx, .xls">
                    </div>
                    <div class="col-md-3 mb-3">
                        <label>Soal (PDF)</label>
                        <input type="file" id="fileSoal" class="form-control" accept=".pdf">
                    </div>
                    <div class="col-md-3 mb-3">
                        <label>Kunci (PDF)</label>
                        <input type="file" id="fileKunci" class="form-control" accept=".pdf">
                    </div>
                </div>
                <button type="submit" class="btn btn-success w-100" id="btnUpload">
                    <i class="fas fa-paper-plane"></i> Kirim Berkas SAT
                </button>
            </form>
        </div>
    </div>

    <div class="card card-custom">
        <div class="card-header bg-white py-3">
            <h5 class="mb-0"><i class="fas fa-table"></i> Monitoring Berkas Terkirim</h5>
        </div>
        <div class="card-body table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Waktu</th>
                        <th>Pengirim</th>
                        <th>Kelas</th>
                        <th>Mapel</th>
                        <th class="text-center">Berkas</th>
                        <th class="text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody">
                    <tr><td colspan="6" class="text-center">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div id="loginView" class="container d-flex justify-content-center align-items-center hidden" style="min-height: 80vh;">
    <div class="card card-custom w-100" style="max-width: 400px;">
        <div class="card-body p-4 text-center">
            <h4>Login Koordinator / Admin</h4>
            <form id="loginForm" class="mt-4 text-start">
                <div class="mb-3">
                    <label>Username</label>
                    <input type="text" id="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-dark w-100 mb-2">Masuk</button>
                <button type="button" class="btn btn-outline-secondary w-100" onclick="showDashboardView()">Batal</button>
            </form>
        </div>
    </div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbwfuMfbdzhnHVyWbr0-Mg4xZ_FZLSyf1V-OIA_P2gcMHllvA6eOsWxFjxD3WWVW1NrT0A/exec';

    let userSession = JSON.parse(localStorage.getItem('sat_session')) || null;
    let savedEmail = localStorage.getItem('user_email_soal') || null;

    function init() {
        showDashboardView();
        if(savedEmail) document.getElementById('email').value = savedEmail;

        const banner = document.getElementById('roleBanner');
        if (userSession) {
            document.getElementById('btnNavAdmin').classList.add('hidden');
            document.getElementById('btnNavLogout').classList.remove('hidden');
            banner.classList.remove('hidden');
            banner.innerHTML = `<strong>Mode ${userSession.role.replace('_',' ').toUpperCase()} Aktif</strong> - Menampilkan data Kelas ${userSession.kelas_ampu}`;
            fetchData(); 
        } else {
            document.getElementById('btnNavAdmin').classList.remove('hidden');
            document.getElementById('btnNavLogout').classList.add('hidden');
            banner.classList.add('hidden');
            if(savedEmail) fetchData();
        }
    }

    function showLoginView() { document.getElementById('dashboardView').classList.add('hidden'); document.getElementById('loginView').classList.remove('hidden'); }
    function showDashboardView() { document.getElementById('loginView').classList.add('hidden'); document.getElementById('dashboardView').classList.remove('hidden'); }

    async function callAPI(payload) {
        const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload), headers: { 'Content-Type': 'text/plain;charset=utf-8' } });
        return await res.json();
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        Swal.fire({ title: 'Otentikasi...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() }});
        let req = await callAPI({ action: 'login', username: document.getElementById('username').value, password: document.getElementById('password').value });
        if (req.success) {
            localStorage.setItem('sat_session', JSON.stringify(req.data));
            userSession = req.data;
            Swal.fire('Berhasil', req.message, 'success');
            init(); 
        } else { Swal.fire('Gagal', req.message, 'error'); }
    });

    function logoutAdmin() { localStorage.removeItem('sat_session'); userSession = null; init(); }

    async function fetchData() {
        document.getElementById('dataTableBody').innerHTML = '<tr><td colspan="6" class="text-center">Memuat data...</td></tr>';
        let payload = { action: 'get_data' };
        if(userSession) {
            payload.role = userSession.role;
            payload.kelas_ampu = userSession.kelas_ampu;
        } else {
            payload.email = document.getElementById('email').value;
            payload.role = 'user';
        }
        
        let req = await callAPI(payload);
        if (req.success) {
            let html = '';
            if(req.data.length === 0) html = '<tr><td colspan="6" class="text-center">Tidak ada data ditemukan.</td></tr>';
            req.data.forEach(row => {
                let btns = `
                    <div class="btn-group">
                        ${row.kisi_url ? `<a href="${row.kisi_url}" target="_blank" class="btn btn-sm btn-outline-success"><i class="fas fa-file-excel"></i></a>` : ''}
                        ${row.soal_url ? `<a href="${row.soal_url}" target="_blank" class="btn btn-sm btn-outline-danger"><i class="fas fa-file-pdf"></i></a>` : ''}
                        ${row.kunci_url ? `<a href="${row.kunci_url}" target="_blank" class="btn btn-sm btn-outline-primary"><i class="fas fa-key"></i></a>` : ''}
                    </div>`;
                html += `<tr>
                    <td><small>${row.waktu}</small></td>
                    <td><strong>${row.nama_pengirim}</strong></td>
                    <td>Kelas ${row.kelas}</td>
                    <td>${row.mata_pelajaran}</td>
                    <td class="text-center">${btns}</td>
                    <td class="text-center">
                        ${(userSession && userSession.role === 'admin') || (savedEmail && row.email === savedEmail) ? `<button onclick="deleteData('${row.id_arsip}')" class="btn btn-sm btn-danger"><i class="fas fa-trash"></i></button>` : '-'}
                    </td>
                </tr>`;
            });
            document.getElementById('dataTableBody').innerHTML = html;
        }
    }

    function deleteData(id) {
        Swal.fire({ title: 'Hapus?', icon: 'warning', showCancelButton: true }).then(async (res) => {
            if (res.isConfirmed) {
                let req = await callAPI({ action: 'delete', id_arsip: id });
                if(req.success) { Swal.fire('Dihapus', req.message, 'success'); fetchData(); }
            }
        });
    }

    function getBase64(file) { return new Promise((res, rej) => { const r = new FileReader(); r.readAsDataURL(file); r.onload = () => res(r.result); r.onerror = e => rej(e); }); }

    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnUpload');
        btn.disabled = true; btn.innerHTML = 'Mengirim...';
        Swal.fire({ title: 'Mengunggah...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() }});

        try {
            let p = {
                action: 'upload', email: document.getElementById('email').value, nama: document.getElementById('nama').value,
                kelas: document.getElementById('kelas').value, mata_pelajaran: document.getElementById('mapel').value,
                file_kisi: document.getElementById('fileKisi').files[0] ? await getBase64(document.getElementById('fileKisi').files[0]) : null,
                file_soal: document.getElementById('fileSoal').files[0] ? await getBase64(document.getElementById('fileSoal').files[0]) : null,
                file_kunci: document.getElementById('fileKunci').files[0] ? await getBase64(document.getElementById('fileKunci').files[0]) : null
            };
            let req = await callAPI(p);
            if(req.success) {
                Swal.fire('Sukses', req.message, 'success');
                localStorage.setItem('user_email_soal', p.email);
                document.getElementById('uploadForm').reset();
                init();
            }
        } catch (err) { Swal.fire('Error', 'Gagal upload', 'error'); }
        btn.disabled = false; btn.innerHTML = 'Kirim Berkas SAT';
    });

    window.onload = init;
</script>
</body>
</html>
